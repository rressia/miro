<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <title>투톤 (twotone)</title>
    <style>
        /* 기본 스타일 */
        :root {
            --primary-color: #222;
            --accent-color: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 메인 카드 박스 */
        .business-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* 텍스트 스타일 */
        .brand-name {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        .old-name {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
        }
        .services {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        /* 연락처 정보 */
        .contact-info {
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .contact-item {
            margin-bottom: 10px;
            font-size: 15px;
            color: #444;
        }
        .contact-item strong {
            color: var(--accent-color);
            font-size: 18px;
        }
        .contact-item a {
            color: inherit;
            text-decoration: none;
        }

        /* 버튼 링크 영역 */
        .button-group {
            display: grid;
            /* 처음 두 개는 나란히, 마지막 하나는 아래에 꽉 차게 배치하거나 
               전부 세로로 쌓는 방식 중 가독성이 좋은 세로 배치를 추천합니다 */
            grid-template-columns: 1fr; 
            gap: 12px;
        }

        /* 현수막 버튼 전용 색상 (원하시는 색으로 변경 가능) */
        .btn-banner {
            background: #e9ecef; /* 연한 그레이 */
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .btn {
            display: block;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn-board {
            background: #f0f0f0;
            color: #333;
        }
        .btn-sample {
            background: var(--primary-color);
            color: #fff;
        }
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* 하단 구분선 및 푸터 */
        .divider {
            height: 1px;
            background: #eee;
            margin: 30px 0;
        }
        .footer-text {
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="business-card">
    <div class="brand-name">투톤</div>
    <div class="old-name">(구 미로디자인)</div>
    
    <div class="services">
        명함 • 스티커 • 전단 • 현수막 • 배너
    </div>

    <div class="contact-info">
        <div class="contact-item">
            📞 Tel: <a href="tel:032-611-2304"><strong>032-611-2304</strong></a>
        </div>
        <div class="contact-item">
            📧 E-mail: <a href="mailto:mirodnp@naver.com">mirodnp@naver.com</a>
        </div>
    </div>

    <!-- 버튼 3개 구성 -->
    <div class="button-group">
        <a href="twotone/" class="btn btn-sample">명함지 샘플 보기</a>
        <a href="twotone/banner_finish.html" class="btn btn-banner">현수막 후가공 안내</a> <!-- 파일명에 맞춰 수정하세요 -->
<!--        <a href="g5/" class="btn btn-board">게시판 이동</a>-->
    </div>

    <div class="divider"></div>
    <div class="footer-text">© TWOTONE All Rights Reserved.</div>
</div>

</body>
</html>
