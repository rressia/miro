<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현수막 후가공 안내 - twotone</title>
    <style>
        body { background-color: #f7f7f7; margin: 0; padding: 20px; font-family: sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }

        /* 네비게이션 버튼 */
        .nav-box { margin-bottom: 30px; text-align: left; }
        .nav-link { 
            display: inline-block;
            text-decoration: none; 
            color: #555; 
            padding: 8px 20px; 
            background: #fff; 
            border: 1px solid #ddd; 
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .nav-link:hover { background: #333; color: #fff; border-color: #333; }

        /* 그리드 설정 */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* 카드 설정 */
        .item-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            position: relative; /* 돋보기 위치의 기준 */
            cursor: pointer;
            transition: 0.3s;
        }

        .item-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            transition: 0.3s;
        }

        /* 🔍 돋보기 오버레이 효과 */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 280px; /* 이미지 영역과 동일하게 */
            background: rgba(0, 0, 0, 0.4); /* 배경 어둡게 */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0; /* 처음엔 안보임 */
            transition: 0.3s;
        }

        /* 돋보기 아이콘 (CSS로 그리기) */
        .overlay::after {
            content: '🔍'; /* 이모지 사용이 가장 가볍고 빠름 */
            font-size: 40px;
        }

        /* 마우스 올렸을 때 효과 */
        .item-card:hover .overlay { opacity: 1; }
        .item-card:hover img { transform: scale(1.05); }

        .item-info {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-top: 1px solid #eee;
        }

        @media (max-width: 600px) {
            .grid-wrapper { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .item-card img, .overlay { height: 140px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-box">
        <a href="../" class="nav-link">← 처음으로 돌아가기</a>
    </div>

    <header><h2>현수막 후가공 종류</h2></header>

    <div class="grid-wrapper">
        <!-- 아이템 반복 -->
        <div class="item-card">
            <div class="overlay"></div> <!-- 돋보기 레이어 -->
            <img src="./현수막후가공/나무미싱.jpg">
            <div class="item-info">나무미싱</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/로프미싱-사방로프-4mm.jpg">
            <div class="item-info">로프미싱 (4mm)</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/로프미싱-사방로프-5mm.jpg">
            <div class="item-info">로프미싱 (5mm)</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/로프미싱-사방로프-6mm.jpg">
            <div class="item-info">로프미싱 (6mm)</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/사방고리.jpg">
            <div class="item-info">사방고리</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/사방고리+로프.jpg">
            <div class="item-info">사방고리 + 로프</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/사방구멍.jpg">
            <div class="item-info">사방구멍</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/사방구멍+로프.jpg">
            <div class="item-info">사방구멍 + 로프</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/사방구멍+큐방.jpg">
            <div class="item-info">사방구멍 + 큐방</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/열칼재단.jpg">
            <div class="item-info">열칼재단</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/원형나무+로프-원단폭 90cm이하.jpg">
            <div class="item-info">원형나무 + 로프</div>
        </div>
        <div class="item-card">
            <div class="overlay"></div>
            <img src="./현수막후가공/일반나무+로프-원단폭 90cm이하.jpg">

        </div>
    </div>

    <div class="nav-box" style="text-align: center; margin-top: 50px;">
        <a href="../" class="nav-link">처음으로 돌아가기</a>
    </div>
</div>

<script>
    // 💡 현수막 방식: 모든 .item-card에 클릭 이벤트 일괄 부여
    document.querySelectorAll('.item-card').forEach(card => {
        card.addEventListener('click', function() {
            const imgSrc = this.querySelector('img').src;
            window.open(imgSrc, '_blank');
        });
    });
</script>

</body>
</html>
